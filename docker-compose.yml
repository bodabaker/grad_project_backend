  # --------------------------------------------------
  # TTS: Fish Audio (HTTP inference server - CUDA mode)
  # --------------------------------------------------
  egtts:
    build:
      context: .
      dockerfile: egtts-service/Dockerfile
    container_name: egtts
    restart: unless-stopped
    environment:
      - EGTTS_MODEL_ID=ahmednabilgm7/EGTTS-Custom
      - EGTTS_BASE_MODEL_ID=coqui/XTTS-v2
      - EGTTS_MODEL_DIR=/models/egtts-cache
      - EGTTS_LOCAL_MODEL_DIR=/models/egtts
      - EGTTS_LANGUAGE=ar
      - EGTTS_DEVICE=cpu
      - EGTTS_DEFAULT_SPEAKER_WAV=/references/speaker_reference.wav
    ports:
      - "5004:5004"
    volumes:
      - ./models/egtts:/models/egtts:ro
      - ./models/xtts-egy:/models/egtts-cache
      - ./speaker_reference.wav:/references/speaker_reference.wav:ro
    networks:
      - aiot_net

  fish-speech:
    image: fishaudio/fish-speech:v1.5.0
    container_name: fish-speech
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/fix/entrypoint-fix.sh"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTORCH_NVML_BASED_CUDA_CHECK=1
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - PYTORCH_CUDA_ALLOC_CONF=garbage_collection_threshold:0.8,max_split_size_mb:128,expandable_segments:True
      - TORCH_CUDA_ALLOC_MAX_FRACTION=0.35
    command:
      - "--listen"
      - "0.0.0.0:8080"
      - "--llama-checkpoint-path"
      - "checkpoints/fish-speech-1.5"
      - "--decoder-checkpoint-path"
      - "checkpoints/fish-speech-1.5/firefly-gan-vq-fsq-8x1024-21hz-generator.pth"
      - "--decoder-config-name"
      - "firefly_gan_vq"
      - "--half"
      - "--compile"
      - "--workers"
      - "1"
    ports:
      - "8086:8080"
    volumes:
      - ./fish-speech/references:/opt/fish-speech/references
      - ./fish-speech/entrypoint-fix.sh:/fix/entrypoint-fix.sh:ro
    networks:
      - aiot_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 120s

  # --------------------------------------------------
  # TTS: OmniVoice (GGML/CUDA, voice design + cloning)
  # --------------------------------------------------
  omnivoice-service:
    build:
      context: .
      dockerfile: omnivoice-service/Dockerfile
    container_name: omnivoice-service
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GGML_BACKEND=CUDA0
      - OMNIVOICE_MODEL=/models/omnivoice-base-Q8_0.gguf
      - OMNIVOICE_CODEC=/models/omnivoice-tokenizer-Q8_0.gguf
      - OMNIVOICE_DEFAULT_LANG=English
    ports:
      - "5008:5008"
    volumes:
      - ./models/omnivoice:/models:ro
      - ./speaker_reference.wav:/references/speaker_reference.wav:ro
    networks:
      - aiot_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5008/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # --------------------------------------------------
  # Audio Playback Service (PulseAudio / PipeWire)
  # --------------------------------------------------
  speaker-player:
    build:
      context: .
      dockerfile: speaker-player/Dockerfile
    container_name: speaker-player
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5007:5007"
    environment:
      - AUDIO_LIBRARY_DIR=/audio
      - PULSE_SERVER=unix:/tmp/pulse/native
      - PULSE_COOKIE=/tmp/pulse/cookie
      - SDL_AUDIODRIVER=pulse
    volumes:
      - ./speaker-player/audio:/audio
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
      - ${HOME}/.config/pulse/cookie:/tmp/pulse/cookie:ro
    networks:
      - aiot_net

  # ==============================
  # ASR: Faster-Whisper (HTTP)
  # ==============================
  asr-fastwhisper:
    build:
      context: ./asr_fasterwhisper
      dockerfile: Dockerfile
    container_name: asr-fastwhisper
    environment:
      - ASR_PORT=5003
      - WHISPER_MODEL=/models/whisper-medium  # local model path (see instructions)
      - WHISPER_DEVICE=cpu            # set to cuda if you enable GPU
      - WHISPER_COMPUTE=float32       # cuda: float16; cpu: int8_float32/float32
      - VAD_FILTER=true               # simple VAD trimming
      - ASR_LANGUAGE=ar
      - ASR_BEAM_SIZE=7
      - ASR_BEST_OF=7
      - ASR_TEMPERATURE=0.0,0.2
      - ASR_CONDITION_ON_PREVIOUS_TEXT=false
      - ASR_REPETITION_PENALTY=1.08
      - ASR_NO_REPEAT_NGRAM_SIZE=3
      - ASR_COMPRESSION_RATIO_THRESHOLD=2.2
      # Optional domain/context prompt to reduce substitutions:
      # - ASR_INITIAL_PROMPT=هذا نظام منزل ذكي ويتضمن أوامر مثل الضوء والمروحة والتكييف
    volumes:
      - ./models/whisper-medium:/models/whisper-medium:ro
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]
    # gpus: all
    ports:
      - "5003:5003"
    networks:
      - aiot_net
    restart: unless-stopped

  # ==============================
  # ASR: Whisper Small Egyptian Arabic (CPU)
  # ==============================
  asr-whisper-egy:
    build:
      context: ./asr_whisper_egy
      dockerfile: Dockerfile
    container_name: asr-whisper-egy
    environment:
      - ASR_PORT=5004
      - HF_WHISPER_MODEL=MAdel121/whisper-small-egyptian-arabic
      - ASR_LANGUAGE=ar
      - ASR_CHUNK_LENGTH_S=20
      - ASR_BATCH_SIZE=8
      - ASR_PRELOAD_MODEL=true
      - HF_HOME=/models/hf-cache
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - asr_egy_hf_cache:/models/hf-cache
    ports:
      - "5005:5004"
    networks:
      - aiot_net
    restart: unless-stopped

  # ==============================
  # ASR: Whisper Large V3 Egyptian Arabic Adapter (CPU)
  # ==============================
  asr-whisper-egy-large:
    build:
      context: ./asr_whisper_egy
      dockerfile: Dockerfile
    container_name: asr-whisper-egy-large
    environment:
      - ASR_PORT=5004
      - HF_WHISPER_MODEL=AbdelrahmanHassan/whisper-large-v3-egyptian-arabic
      - ASR_LANGUAGE=ar
      - ASR_CHUNK_LENGTH_S=15
      - ASR_BATCH_SIZE=1
      - ASR_NUM_BEAMS=1
      - ASR_PRELOAD_MODEL=false
      - HF_HOME=/models/hf-cache
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - asr_egy_hf_cache:/models/hf-cache
    ports:
      - "5006:5004"
    networks:
      - aiot_net
    restart: unless-stopped

volumes:
  mosq_data:
  mosq_log:
  ollama_data:
  piper_voices:
  asr_egy_hf_cache:
  llama_hf_cache:

