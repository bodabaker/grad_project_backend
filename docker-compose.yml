  # --------------------------------------------------
  # LLM: llama.cpp server with multiple models
  # --------------------------------------------------
  ollama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8157
    container_name: ollama
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    ports:
      - "8080:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
      - LLAMA_ARG_MODELS_PRESET=/models/presets.ini
      - LLAMA_ARG_MODELS_MAX=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--models-preset"
      - "/models/presets.ini"
      - "--models-max"
      - "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - aiot_net


