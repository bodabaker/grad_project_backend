services:
  # --------------------------------------------------
  # MediaMTX (RTSP / RTMP / HLS / WebRTC) Server
  # --------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    networks:
      - aiot_net
  # --------------------------------------------------
  # MQTT Broker
  # --------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosq_data:/mosquitto/data
      - mosq_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Broker Beacon (UDP discovery for MQTT broker)
  # --------------------------------------------------
  server-beacon:
    image: python:3.11-slim
    container_name: server-beacon
    working_dir: /app
    command: ["python", "/app/beacon.py"]
    volumes:
      - ./beacon.py:/app/beacon.py:ro
    environment:
      - TZ=Etc/UTC
    depends_on:
      - mosquitto
    network_mode: host
    restart: unless-stopped

  # --------------------------------------------------
  # LLM: llama.cpp server - Qwen 3.5 4B (GPU)
  # --------------------------------------------------
  llama-qwen:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12
    # pull_policy: always
    container_name: llama-qwen
    restart: unless-stopped
    # mem_limit: 8g
    # memswap_limit: 8g
    ports:
      - "8080:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
      - ./llama/mmproj:/mmproj
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/Qwen3.5-4B-Q4_K_M.gguf"
      - "--mmproj"
      - "/mmproj/mmproj.gguf"
      - "-c"
      - "15000"
      - "-b"
      - "2048"
      - "-ub"
      - "512"
      - "-ngl"
      - "999"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "bf16"
      - "--cache-type-v"
      - "bf16"
      - "--no-mmap"
      - "-dio"
      - "--backend-sampling"
      - "-t"
      - "10"
      - "-tb"
      - "10"
      - "-np"
      - "1"
      # - "--repeat-penalty"
      # - "1.0"
      # - "--presence-penalty"
      # - "0.0"
      - "--chat-template-kwargs"
      - "{\"enable_thinking\":true}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - aiot_net

  # --------------------------------------------------
  # LLM: llama.cpp server - NileChat 3B (CPU)
  # --------------------------------------------------
  llama-nilechat:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12
    pull_policy: always
    container_name: llama-nilechat
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    ports:
      - "8082:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
      - LLAMA_ARG_MODELS_PRESET=/models/presets-nilechat.ini
      - LLAMA_ARG_MODELS_MAX=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--models-preset"
      - "/models/presets-nilechat.ini"
      - "--models-max"
      - "1"
    networks:
      - aiot_net

  # --------------------------------------------------
  # Camera Publisher (captures webcam and publishes to RTSP)
  # --------------------------------------------------
  camera-publisher:
    build:
      context: .
      dockerfile: camera-publisher/Dockerfile
    entrypoint: ["/app/start.sh"]
    container_name: camera-publisher
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8060:8060"
    devices:
      - "/dev/video0:/dev/video0"    # adjust if your camera index differs
      - "/dev/dri:/dev/dri"
    group_add:
      - "video"
    # privileged: true               # uncomment temporarily if /dev/video0 perms fail
    environment:
      CAM_DEVICE: /dev/video0
      CAM_SIZE: 1280x720
      CAM_FPS: "10"               # Match camera's native FPS
      ENCODER: libx264           # on Raspberry Pi/ARM: h264_v4l2m2m
      BITRATE: 1500k            # Lower bitrate for less latency
      RTSP_URL: rtsp://mediamtx:8554/cam
    networks:
      - aiot_net

  # --------------------------------------------------
  # Face Recognition Service (consumer of RTSP)
  # --------------------------------------------------
  face-service:
    build:
      context: ./CV/face-detection
      dockerfile: Dockerfile
    container_name: face-service
    group_add:
      - "video"
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
      - MQTT_BROKER=mosquitto         # reachable now via Docker DNS
      - MQTT_PORT=1883
    ports:
      - "8000:8000"
    volumes:
      - ./CV/face-detection/persons:/data/persons:ro
      - ./CV/face-detection/captures:/data/caps
    depends_on:
      - mosquitto
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Fire Detection Service (consumer of RTSP)
  # --------------------------------------------------
  fire-service:
    build:
      context: ./CV/fire-detection
      dockerfile: Dockerfile
    container_name: fire-service
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
      - MODEL_PATH=/models/fire_model.pt
    ports:
      - "8010:8010"
    volumes:
      - ./CV/fire-detection/models:/models:ro
      - ./CV/fire-detection/captures:/data/caps
    depends_on:
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Object Detection Service (consumer of RTSP)
  # --------------------------------------------------
  object-service:
    build:
      context: ./CV/object-detection
      dockerfile: Dockerfile
    container_name: object-service
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
    ports:
      - "8020:8020"
    volumes:
      - ./CV/object-detection/models:/models:ro
      - ./CV/object-detection/captures:/data/caps
    depends_on:
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # OCR Service (Text Detection with EasyOCR)
  # --------------------------------------------------
  ocr-service:
    build:
      context: ./CV/ocr
      dockerfile: Dockerfile
    container_name: ocr-service
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
      - EASYOCR_MODULE_PATH=/models/easyocr
    ports:
      - "8030:8030"
    volumes:
      - ./CV/ocr/models:/models/easyocr
      - ./CV/ocr/captures:/data/caps
    depends_on:
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Body Detection Service (Pose / Fall Detection)
  # --------------------------------------------------
  body-service:
    build:
      context: ./CV/body-detection
      dockerfile: Dockerfile
    container_name: body-service
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
    ports:
      - "8040:8040"
    volumes:
      - ./CV/body-detection/models:/models:ro
      - ./CV/body-detection/captures:/data/caps
    depends_on:
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Gesture Control Service (Hands + MQTT)
  # --------------------------------------------------
  gesture-service:
    build:
      context: ./CV/gesture-control
      dockerfile: Dockerfile
    container_name: gesture-service
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
    ports:
      - "8050:8050"
    volumes:
      - ./CV/gesture-control/references:/data/references:ro
      - ./CV/gesture-control/captures:/data/caps
    depends_on:
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # n8n Automation Server
  # --------------------------------------------------
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    image: aiot-n8n:latest
    container_name: n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PUBLIC_API_DEFAULT=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_DEFAULT_LOCALE=en
      - GENERIC_TIMEZONE=Etc/UTC
      - TZ=Etc/UTC
      - N8N_ENCRYPTION_KEY=my_fixed_key_here
      - N8N_EXECUTIONS_DATA_PRUNE=true
      - N8N_EXECUTIONS_DATA_MAX_AGE=168
      - N8N_EXECUTIONS_PRUNE_INTERVAL=60
      - N8N_ENDPOINT_WEBHOOK=run
      - NODES_EXCLUDE=[]
      - NODE_FUNCTION_ALLOW_EXTERNAL=langchain,@langchain/*
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    networks:
      - aiot_net

