  # --------------------------------------------------
  # TTS: Fish Audio (HTTP inference server - CPU mode)
  # --------------------------------------------------
  egtts:
    build:
      context: .
      dockerfile: egtts-service/Dockerfile
    container_name: egtts
    restart: unless-stopped
    environment:
      - EGTTS_MODEL_ID=ahmednabilgm7/EGTTS-Custom
      - EGTTS_BASE_MODEL_ID=coqui/XTTS-v2
      - EGTTS_MODEL_DIR=/models/egtts-cache
      - EGTTS_LOCAL_MODEL_DIR=/models/egtts
      - EGTTS_LANGUAGE=ar
      - EGTTS_DEVICE=cpu
      - EGTTS_DEFAULT_SPEAKER_WAV=/references/speaker_reference.wav
    ports:
      - "5004:5004"
    volumes:
      - ./models/egtts:/models/egtts:ro
      - ./models/xtts-egy:/models/egtts-cache
      - ./speaker_reference.wav:/references/speaker_reference.wav:ro
    networks:
      - aiot_net

  fish-speech:
    image: fishaudio/fish-speech:server-cpu
    container_name: fish-speech
    restart: unless-stopped
    ports:
      - "8086:8080"          # Fish Audio API server
    command: 
      - "--device"
      - "cpu"
      - "--workers"
      - "1"
      - "--max-text-length"
      - "200"
    volumes:
      - ./fish-speech/checkpoints:/app/checkpoints
      - ./fish-speech/references:/app/references
    environment:
      - COMPILE=0                                                  # torch.compile not supported on CPU
      - OMP_NUM_THREADS=16                                         # Use all 16 CPU cores
      - TORCH_NUM_THREADS=16                                       # PyTorch uses all available cores
      - TORCH_NUM_INTEROP_THREADS=4                                # Inter-op threading
      - MKL_NUM_THREADS=16                                         # Intel MKL uses all cores
      - OPENBLAS_NUM_THREADS=16                                    # OpenBLAS uses all cores
      - LLAMA_CHECKPOINT_PATH=checkpoints/openaudio-s1-mini        # Path to model weights
      - DECODER_CHECKPOINT_PATH=checkpoints/openaudio-s1-mini/codec.pth
      - DECODER_CONFIG_NAME=modded_dac_vq
    networks:
      - aiot_net

  # ==============================
  # ASR: Faster-Whisper (HTTP)
  # ==============================
  asr-fastwhisper:
    build:
      context: ./asr_fasterwhisper
      dockerfile: Dockerfile
    container_name: asr-fastwhisper
    environment:
      - ASR_PORT=5003
      - WHISPER_MODEL=/models/whisper-medium  # local model path (see instructions)
      - WHISPER_DEVICE=cpu            # set to cuda if you enable GPU
      - WHISPER_COMPUTE=float32       # cuda: float16; cpu: int8_float32/float32
      - VAD_FILTER=true               # simple VAD trimming
      - ASR_LANGUAGE=ar
      - ASR_BEAM_SIZE=7
      - ASR_BEST_OF=7
      - ASR_TEMPERATURE=0.0,0.2
      - ASR_CONDITION_ON_PREVIOUS_TEXT=false
      - ASR_REPETITION_PENALTY=1.08
      - ASR_NO_REPEAT_NGRAM_SIZE=3
      - ASR_COMPRESSION_RATIO_THRESHOLD=2.2
      # Optional domain/context prompt to reduce substitutions:
      # - ASR_INITIAL_PROMPT=هذا نظام منزل ذكي ويتضمن أوامر مثل الضوء والمروحة والتكييف
    volumes:
      - ./models/whisper-medium:/models/whisper-medium:ro
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]
    # gpus: all
    ports:
      - "5003:5003"
    networks:
      - aiot_net
    restart: unless-stopped

  # ==============================
  # ASR: Whisper Small Egyptian Arabic (CPU)
  # ==============================
  asr-whisper-egy:
    build:
      context: ./asr_whisper_egy
      dockerfile: Dockerfile
    container_name: asr-whisper-egy
    environment:
      - ASR_PORT=5004
      - HF_WHISPER_MODEL=MAdel121/whisper-small-egyptian-arabic
      - ASR_LANGUAGE=ar
      - ASR_CHUNK_LENGTH_S=20
      - ASR_BATCH_SIZE=8
      - ASR_PRELOAD_MODEL=true
      - HF_HOME=/models/hf-cache
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - asr_egy_hf_cache:/models/hf-cache
    ports:
      - "5005:5004"
    networks:
      - aiot_net
    restart: unless-stopped

  # ==============================
  # ASR: Whisper Large V3 Egyptian Arabic Adapter (CPU)
  # ==============================
  asr-whisper-egy-large:
    build:
      context: ./asr_whisper_egy
      dockerfile: Dockerfile
    container_name: asr-whisper-egy-large
    environment:
      - ASR_PORT=5004
      - HF_WHISPER_MODEL=AbdelrahmanHassan/whisper-large-v3-egyptian-arabic
      - ASR_LANGUAGE=ar
      - ASR_CHUNK_LENGTH_S=15
      - ASR_BATCH_SIZE=1
      - ASR_NUM_BEAMS=1
      - ASR_PRELOAD_MODEL=false
      - HF_HOME=/models/hf-cache
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - asr_egy_hf_cache:/models/hf-cache
    ports:
      - "5006:5004"
    networks:
      - aiot_net
    restart: unless-stopped

volumes:
  mosq_data:
  mosq_log:
  ollama_data:
  piper_voices:
  asr_egy_hf_cache:

# --------------------------------------------------
# Networks & Volumes
# --------------------------------------------------
networks:
  aiot_net:
    driver: bridge
