services:
  # --------------------------------------------------
  # MediaMTX (RTSP / RTMP / HLS / WebRTC) Server
  # --------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    networks:
      - aiot_net
  # --------------------------------------------------
  # MQTT Broker
  # --------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosq_data:/mosquitto/data
      - mosq_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # LLM: llama.cpp server - Qwen 2.5 7B (GPU)
  # --------------------------------------------------
  llama-qwen:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8157
    container_name: llama-qwen
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    ports:
      - "8081:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
      - LLAMA_ARG_MODELS_PRESET=/models/presets-qwen.ini
      - LLAMA_ARG_MODELS_MAX=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--models-preset"
      - "/models/presets-qwen.ini"
      - "--models-max"
      - "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - aiot_net

  # --------------------------------------------------
  # LLM: llama.cpp server - NileChat 3B (CPU)
  # --------------------------------------------------
  llama-nilechat:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8157
    container_name: llama-nilechat
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    ports:
      - "8082:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
      - LLAMA_ARG_MODELS_PRESET=/models/presets-nilechat.ini
      - LLAMA_ARG_MODELS_MAX=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--models-preset"
      - "/models/presets-nilechat.ini"
      - "--models-max"
      - "1"
    networks:
      - aiot_net

  # --------------------------------------------------
  # Camera Publisher (captures webcam and publishes to RTSP)
  # --------------------------------------------------
  camera-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: camera-publisher
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - "/dev/video0:/dev/video0"    # adjust if your camera index differs
      - "/dev/dri:/dev/dri"
    group_add:
      - "video"
    # privileged: true               # uncomment temporarily if /dev/video0 perms fail
    environment:
      CAM_DEVICE: /dev/video0
      CAM_SIZE: 1280x720
      CAM_FPS: "10"               # Match camera's native FPS
      ENCODER: libx264           # on Raspberry Pi/ARM: h264_v4l2m2m
      BITRATE: 1500k            # Lower bitrate for less latency
      RTSP_URL: rtsp://mediamtx:8554/cam
    volumes:
      - ./camera_publish.sh:/app/publish.sh:ro
    networks:
      - aiot_net
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec sh /app/publish.sh"]

  # --------------------------------------------------
  # Face Recognition Service (consumer of RTSP)
  # --------------------------------------------------
  face-service:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: face-service
    group_add:
      - "video"
    environment:
      - TZ=Etc/UTC
      - CAMERA_URL=rtsp://mediamtx:8554/cam
      - MQTT_BROKER=mosquitto         # reachable now via Docker DNS
      - MQTT_PORT=1883
    ports:
      - "8000:8000"
    volumes:
      - ./persons:/data/persons:ro
      - ./captures:/data/caps
    depends_on:
      - mosquitto
      - mediamtx
      - camera-publisher
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # n8n Automation Server
  # --------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PUBLIC_API_DEFAULT=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_DEFAULT_LOCALE=en
      - GENERIC_TIMEZONE=Etc/UTC
      - TZ=Etc/UTC
      - N8N_ENCRYPTION_KEY=my_fixed_key_here
      - N8N_EXECUTIONS_DATA_PRUNE=true
      - N8N_EXECUTIONS_DATA_MAX_AGE=168
      - N8N_EXECUTIONS_PRUNE_INTERVAL=60
      - N8N_ENDPOINT_WEBHOOK=run
      - NODE_FUNCTION_ALLOW_EXTERNAL=langchain,langchain/*,@langchain/*
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    networks:
      - aiot_net

