services:
  # --------------------------------------------------
  # MediaMTX (RTSP / RTMP / HLS / WebRTC) Server
  # --------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    networks:
      - aiot_net
  # --------------------------------------------------
  # MQTT Broker
  # --------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosq_data:/mosquitto/data
      - mosq_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - aiot_net

  # --------------------------------------------------
  # Broker Beacon (UDP discovery for MQTT broker)
  # --------------------------------------------------
  server-beacon:
    image: python:3.11-slim
    container_name: server-beacon
    working_dir: /app
    command: ["python", "/app/beacon.py"]
    volumes:
      - ./beacon.py:/app/beacon.py:ro
    environment:
      - TZ=Etc/UTC
    depends_on:
      - mosquitto
    network_mode: host
    restart: unless-stopped

  # --------------------------------------------------
  # LLM rollback template: llama.cpp server - Qwen 3.5 4B (GPU)
  # Disabled on purpose. Keep for fast rollback.
  # --------------------------------------------------

  llama-qwen:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8757
    # pull_policy: always
    container_name: llama-qwen
    restart: unless-stopped
    # mem_limit: 8g
    # memswap_limit: 8g
    ports:
      - "8080:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
      - ./llama/mmproj/gemma_mmproj-F16 (1).gguf:/mmproj/gemma-mmproj.gguf:ro
      - ./llama/mmproj:/mmproj
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/Qwen3.5-4B-Q4_K_M.gguf"
      - "--mmproj"
      - "/mmproj/gemma-mmproj.gguf"
      - "--image-min-tokens"
      - "1024"
      - "-c"
      - "7000"
      - "-ub"
      - "512"
      - "-ngl"
      - "999"
      - "--no-mmap"
      - "-dio"
      - "--backend-sampling"
      - "-t"
      - "10"
      - "-tb"
      - "10"
      - "-np"
      - "1"
      # - "--repeat-penalty"
      # - "1.0"
      # - "--presence-penalty"
      # - "0.0"
      - "--chat-template-kwargs"
      - "{\"enable_thinking\":true}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    gpus: all
    networks:
      - aiot_net

  # --------------------------------------------------
  # LLM: llama-swap native control plane (GPU)
  # --------------------------------------------------
  llama-swap:
    build:
      context: .
      dockerfile: llama-swap/Dockerfile
    image: aiot-llama-swap:latest
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
      - ./llama/mmproj:/mmproj
      - ./llama/llama-swap.yaml:/app/config.yaml:ro
      - llama_hf_cache:/models/hf-cache
    command:
      - "-config"
      - "/app/config.yaml"
      - "-listen"
      - "0.0.0.0:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - aiot_net

  # --------------------------------------------------
  # LLM: llama.cpp server - Gemma 4 E2B (GPU)
  # Best-practice defaults from the Gemma 4 model card:
  # temperature=1.0, top_p=0.95, top_k=64.
  # --------------------------------------------------
  gemma-service:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12
    container_name: gemma-service
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8081:8080"
    volumes:
      - ./llama/models:/models
      - ./llama/grammars:/grammars
      - ./llama/mmproj/mmproj-BF16.gguf:/mmproj/mmproj.gguf:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_VERBOSE=1
    depends_on:
      fish-speech:
        condition: service_healthy
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--jinja"
      - "--model"
      - "/models/gemma-4-E2B-it-UD-Q4_K_XL.gguf"
      - "--mmproj"
      - "/mmproj/mmproj.gguf"
      - "--image-max-tokens"
      - "2240"
      - "-b"
      - "512"
      - "-ub"
      - "512"
      - "-ngl"
      - "28"
      - "--fit"
      - "on"
      - "--fit-target"
      - "3584"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q4_0"
      - "--cache-type-v"
      - "q4_0"
      - "--no-mmap"
      - "-dio"
      - "--backend-sampling"
      - "-t"
      - "10"
      - "-tb"
      - "10"
      - "-np"
      - "1"
      - "--reasoning-budget"
      - "-1"
      - "--chat-template-kwargs"
      - "{\"enable_thinking\":true}"
    networks:
      - aiot_net

